<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CityLive</title>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0c14">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src https://api.open-meteo.com https://air-quality-api.open-meteo.com https://services.swpc.noaa.gov https://api.airplanes.live https://site.api.espn.com https://ipwho.is http://api.open-notify.org; img-src 'self' data:; manifest-src 'self';">
<link rel="manifest" href="manifest.json">
<style>
  html,body{margin:0;padding:0;background:#0a0c14;height:100%;overflow:hidden}
  canvas{position:fixed;inset:0;display:block;width:100vw;height:100vh;image-rendering:pixelated;image-rendering:crisp-edges}
  #cvbg{z-index:0} #cv{z-index:1}
  #renderError{position:fixed;z-index:8;left:8px;right:8px;top:max(8px,env(safe-area-inset-top));display:none;
    padding:7px;background:rgba(92,13,24,.94);color:#ffe8e8;border:1px solid #e65b6d;border-radius:8px;font:11px system-ui,sans-serif}
</style>
</head>
<body>
<canvas id="cvbg"></canvas><canvas id="cv"></canvas>
<div id="renderError" role="alert"></div>
<script src="config.js"></script>
<script src="city.js"></script>
<script src="citizens-overlay.js"></script>
<script>
// CityLive phone port — the same engine, one screen, performance tier.
(function(){
  var cv=document.getElementById("cv"), bgcv=document.getElementById("cvbg"), g=cv.getContext("2d"), bg=bgcv.getContext("2d");
  var PXK=4, ZOOMP=1, curQ="performance";
  function boot(){
    var dpr=Math.min(2,window.devicePixelRatio||1);
    var pw=Math.round(window.innerWidth*dpr), ph=Math.round(window.innerHeight*dpr);
    // auto-scale for any phone: pick PXK from the short side against the tuned baseline
    PXK=Math.max(2,Math.min(10,Math.round(Math.min(pw,ph)/430)||PXK));
    var cw=Math.max(120,Math.round(pw/PXK)), ch=Math.max(120,Math.round(ph/PXK));
    cv.width=bgcv.width=cw; cv.height=bgcv.height=ch;
    setup("neon",{cw:cw,ch:ch,woff:0,ww:cw,pxk:PXK,kspAuto:true,zoom:ZOOMP,quality:curQ});
    bgDirty=true;
  }
  boot();
  var t=null;
  window.addEventListener("resize",function(){ clearTimeout(t); t=setTimeout(boot,300); });
  // Battery-friendly split renderer. Double-tapping changes both effect density
  // and cadence, so Spectacle visibly takes effect instead of remaining capped at 8fps.
  var lastFg=0,lastBg=0,bgDirty=true,lastError='';
  function renderError(e){var msg=String(e&&e.stack||e||'Unknown render error');if(msg!==lastError){console.error('CityLive render failure:',e);lastError=msg;}
    var el=document.getElementById('renderError');el.textContent='CityLive recovered from a render error: '+msg.split('\n')[0];el.style.display='block';}
  function frame(ts){requestAnimationFrame(frame);var fps=curQ==='performance'?8:(curQ==='balanced'?10:12);
    if(document.hidden||ts-lastFg<1000/fps)return;try{
    var bgStep=curQ==='performance'?2000:(curQ==='balanced'?1000:500);
    if(bgDirty||ts-lastBg>=bgStep){draw(bg,'bg');lastBg=ts;bgDirty=false;}draw(g,'fg');lastFg=ts;
  }catch(e){renderError(e);lastFg=ts;}}
  requestAnimationFrame(frame);
  // TOUCH: drag horizontally to scrub the city's whole life under your finger; release to
  // return to live time. Double-tap toggles performance/spectacle.
  var lastTap=0;
  cv.style.touchAction="none";
  window.addEventListener("pointerdown",function(e){
    var t2=Date.now();
    if(t2-lastTap<350){ curQ=(curQ==="performance")?"spectacle":"performance"; boot2(); }
    lastTap=t2;
  });
  window.addEventListener("pointermove",function(e){
    if(e.buttons||e.pressure>0){ var f=Math.max(0.001,Math.min(0.999,e.clientX/window.innerWidth));
      FORCEAGE=f; }
  });
  window.addEventListener("pointerup",function(){ FORCEAGE=null; });
  function boot2(){ var dpr=Math.min(2,window.devicePixelRatio||1);
    var pw=Math.round(window.innerWidth*dpr), ph=Math.round(window.innerHeight*dpr);
    var cw=Math.max(120,Math.round(pw/PXK)), ch=Math.max(120,Math.round(ph/PXK));
    cv.width=bgcv.width=cw; cv.height=bgcv.height=ch;
    setup("neon",{cw:cw,ch:ch,woff:0,ww:cw,pxk:PXK,kspAuto:true,zoom:ZOOMP,quality:curQ});
    bgDirty=true;
  }
  // keep the screen awake while displayed (best effort)
  if(navigator.wakeLock) navigator.wakeLock.request("screen").catch(function(){});
  document.addEventListener("visibilitychange",function(){
    if(!document.hidden&&navigator.wakeLock) navigator.wakeLock.request("screen").catch(function(){});
  });
})();
</script>
</body>
</html>
