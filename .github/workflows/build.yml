name: Build CityLive desktop apps

# Builds native installers on each OS's own runner, so the Windows .exe and macOS
# .dmg are produced with their real toolchains (they cannot be built from Linux).
# Trigger by pushing a version tag (e.g. v1.0.0) or from the Actions tab.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: dist:linux
            artifact: linux-installers
          - os: windows-latest
            target: dist:win
            artifact: windows-installer
          - os: macos-latest
            target: dist:mac
            artifact: macos-installer
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci || npm install

      - name: Unit tests
        run: npm test

      - name: Build installer
        # Build only — do NOT publish from here (these jobs are read-only; the release
        # job below publishes). electron-builder still emits the latest*.yml auto-update
        # manifests into dist/ because package.json has a publish config.
        run: npm run ${{ matrix.target }} -- --publish never
        env:
          # unsigned builds are fine for personal use; CSC_* secrets enable signing if added
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Verify koffi native binary is packaged + loads (Windows wallpaper mode)
        # The behind-icons wallpaper needs koffi's win32 .node, which lives in the separate
        # @koromix/koffi-win32-x64 package and MUST be asar-unpacked. If it isn't shipped or
        # can't dlopen, wallpaper.available() silently returns false and the feature dies.
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $root = "dist/win-unpacked/resources/app.asar.unpacked/node_modules"
          $paths = @(
            "$root/@koromix/koffi-win32-x64/win32_x64/koffi.node",
            "$root/koffi/build/koffi/win32_x64/koffi.node"
          )
          $found = $paths | Where-Object { Test-Path $_ }
          if (-not $found) {
            Write-Error "koffi win32 .node not found in packaged app. Checked: $($paths -join '; ')"
            Get-ChildItem -Recurse "$root/@koromix" -ErrorAction SilentlyContinue | Select-Object FullName
            exit 1
          }
          Write-Host "Found packaged koffi native binary: $($found -join ', ')"
          # Prove the win32 prebuilt actually dlopens (N-API → Node/Electron share the ABI).
          node -e "const k=require('koffi'); k.load('user32.dll'); console.log('koffi win32 dlopen OK')"

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          # Include the update manifests (*.yml) + delta maps (*.blockmap) so electron-updater works.
          path: |
            desktop/dist/*.AppImage
            desktop/dist/*.deb
            desktop/dist/*.exe
            desktop/dist/*.dmg
            desktop/dist/*.yml
            desktop/dist/*.blockmap
          if-no-files-found: ignore

  release:
    # When triggered by a version tag, gather every OS's installers into one GitHub Release.
    # always() → publish whatever built even if one OS's leg flaked (a mac hiccup must not
    # hold the Windows installer hostage).
    if: ${{ always() && startsWith(github.ref, 'refs/tags/v') }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      # Only publish when installers actually exist. always() lets this job run even if one OS leg
      # flaked (mac hiccup must not block the Windows installer) — but if EVERY build failed there are
      # no artifacts, and publishing anyway created an empty DRAFT release that then collided on the
      # next tag run (duplicate-draft removal → "Not Found" asset race → the job failed & emailed).
      # This guard skips cleanly on total failure: no empty release, no collision, no failure email.
      - name: Check for built installers
        id: haveart
        run: |
          if [ -n "$(find artifacts -type f 2>/dev/null | head -1)" ]; then echo "found=true" >> "$GITHUB_OUTPUT"; else echo "found=false" >> "$GITHUB_OUTPUT"; fi
      - name: Publish release
        if: ${{ steps.haveart.outputs.found == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false          # publish LIVE so electron-updater sees it immediately (no manual un-drafting)
          make_latest: true
