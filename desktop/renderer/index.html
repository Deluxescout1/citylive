<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<title>CityLive</title>
<meta name="theme-color" content="#0a0c14">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src https://api.open-meteo.com https://air-quality-api.open-meteo.com https://services.swpc.noaa.gov https://api.airplanes.live https://site.api.espn.com https://ipwho.is http://api.open-notify.org; img-src 'self' data:;">
<style>
  :root{ --panel:rgba(14,18,28,.82); --line:#2a3550; --txt:#e6ecf7; --sub:#93a2c0; --cyan:#39e6ff; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#05070c;overflow:hidden;
    font:13px/1.4 "JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:var(--txt)}
  .city-canvas{position:fixed;inset:0;display:block;width:100vw;height:100vh;image-rendering:pixelated;image-rendering:crisp-edges}
  #cvbg{z-index:0} #cv{z-index:1}
  /* control bar — auto-hides; hover/tap the top edge to reveal */
  #bar{position:fixed;left:0;right:0;top:0;display:flex;flex-wrap:wrap;gap:10px;align-items:center;
    padding:8px 12px;background:var(--panel);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);
    transform:translateY(-108%);transition:transform .25s ease;z-index:10}
  #bar.show,#bar:hover,#hot:hover + #bar{transform:none}
  #hot{position:fixed;left:0;right:0;top:0;height:14px;z-index:9}
  .brand{font-weight:700;letter-spacing:1px;color:var(--cyan);text-shadow:0 0 10px rgba(57,230,255,.4)}
  .grp{display:flex;gap:6px;align-items:center;color:var(--sub)}
  select,button{font:inherit;color:var(--txt);background:#161d2e;border:1px solid var(--line);border-radius:7px;padding:5px 9px;cursor:pointer}
  button.on{background:linear-gradient(180deg,#1b6,#0a5);border-color:#0a5;color:#eafff3}
  input[type=range]{accent-color:var(--cyan);width:118px}
  .grow{flex:1}
  #hud{position:fixed;left:12px;bottom:10px;color:var(--sub);background:var(--panel);border:1px solid var(--line);
    border-radius:7px;padding:5px 9px;z-index:8;opacity:.9}
  #hud b{color:var(--txt)}
  #happening{position:fixed;right:12px;top:50%;transform:translateY(-50%);max-width:min(390px,calc(100vw - 24px));z-index:8;
    color:var(--sub);background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:7px 10px;opacity:.92}
  #happening .title{color:var(--txt);font-weight:700} #happening .meta{font-size:11px;margin-top:2px}
  #renderError{position:fixed;right:12px;top:12px;z-index:30;display:none;max-width:min(520px,calc(100vw - 24px));
    color:#ffe8e8;background:rgba(92,13,24,.94);border:1px solid #e65b6d;border-radius:9px;padding:8px 10px;font-size:11px}
  #help{position:fixed;right:12px;bottom:10px;color:var(--sub);z-index:8;opacity:.7;font-size:11px}
  @media (max-width:640px){ #bar{gap:6px;padding:6px 8px} input[type=range]{width:84px} .lbl{display:none} }
  /* ---- Settings panel (birthdays / location / speed) ---- */
  #settings{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;
    background:rgba(3,5,10,.66);backdrop-filter:blur(3px)}
  #settings.hidden{display:none}
  #settings .sheet{width:min(560px,92vw);max-height:88vh;overflow:auto;background:var(--panel);
    border:1px solid var(--line);border-radius:14px;padding:18px 20px;box-shadow:0 18px 60px rgba(0,0,0,.5)}
  #settings h2{margin:0 0 2px;color:var(--cyan);letter-spacing:1px}
  #settings h3{margin:14px 0 4px;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--cyan)}
  #settings .hint{margin:0 0 8px;color:var(--sub);font-size:11px;line-height:1.5}
  #settings section{border-top:1px solid var(--line);padding-top:8px;margin-top:12px}
  #settings section:first-of-type{border-top:0;margin-top:8px}
  #settings input[type=text],#settings input[type=number],#settings select{
    font:inherit;color:var(--txt);background:#0f1626;border:1px solid var(--line);border-radius:7px;padding:6px 8px}
  .brow{display:flex;gap:6px;align-items:center;margin:5px 0}
  .brow .bm,.brow .bd{width:48px;text-align:center}
  .brow .bl{flex:1;min-width:0}
  .brow .pink{display:flex;align-items:center;gap:3px;color:var(--sub);font-size:11px;white-space:nowrap}
  .brow .del{padding:5px 9px;color:#ff9aa2}
  #settings .row2{display:flex;gap:10px;align-items:flex-start}
  #settings .row2 label{display:flex;flex-direction:column;gap:3px;flex:1;color:var(--sub);font-size:11px}
  #settings .row2 select{width:100%}
  #settings .actions{display:flex;gap:8px;align-items:center;margin-top:18px}
  #settings .grow{flex:1}
  #settings button.primary{background:linear-gradient(180deg,#1b6,#0a5);border-color:#0a5;color:#eafff3}
  #settings button.ghost{background:transparent}
</style>
</head>
<body>
<canvas id="cvbg" class="city-canvas"></canvas>
<canvas id="cv" class="city-canvas"></canvas>
<div id="hot"></div>
<div id="bar">
  <span class="brand">CityLive</span>
  <span class="grp"><span class="lbl">city</span>
    <select id="era" title="Which city / architectural age"></select></span>
  <span class="grp"><span class="lbl">time</span>
    <input id="hour" type="range" min="0" max="235" value="0" title="Time of day (Live = real time)">
    <button id="hourLive" class="on" title="Follow real local time">live</button></span>
  <span class="grp"><span class="lbl">age</span>
    <input id="age" type="range" min="1" max="99" value="50" title="City age: wilderness → metropolis (Live = real cycle)">
    <button id="ageLive" class="on" title="Follow the real growth cycle">live</button></span>
  <span class="grp"><span class="lbl">quality</span>
    <select id="q" title="Render quality">
      <option value="spectacle">spectacle</option>
      <option value="balanced">balanced</option>
      <option value="performance">performance</option></select></span>
  <span class="grow"></span>
  <button id="pause" title="Pause / resume">⏸</button>
  <button id="full" title="Fullscreen">⛶</button>
</div>
<div id="hud">— </div>
<div id="happening" aria-live="polite"><div class="title">CityLive is starting…</div><div class="meta">Building the current city state</div></div>
<div id="renderError" role="alert"></div>
<div id="help">drag <b>time</b> to scrub the day · <b>age</b> to grow the city · hover top edge for controls</div>


<script src="config.js"></script>
<script>
  // Update-safe user settings (userData/config.json, bridged by preload as a JSON string)
  // override the bundled defaults above. Runs before city.js reads window.CITYLIVE_CFG.
  try {
    if (window.citylive && window.citylive.userConfigJSON) {
      var _u = JSON.parse(window.citylive.userConfigJSON);
      if (_u && typeof _u === 'object') window.CITYLIVE_CFG = _u;
    }
  } catch (e) { /* keep bundled defaults */ }
</script>
<script src="city.js"></script>
<script>
(function(){
  var cv=document.getElementById('cv'), bgcv=document.getElementById('cvbg'), g=cv.getContext('2d'), bg=bgcv.getContext('2d');
  var PXK=4;
  // Environment facts from the main process (desktop app only; empty {} on the web):
  // wallpaper mode → reserve street above the Windows taskbar; primaryW → feature-scale
  // reference so a multi-monitor union canvas scales to ONE monitor, not the whole desktop.
  var ENV={}; try{ if(window.citylive&&window.citylive.envJSON) ENV=JSON.parse(window.citylive.envJSON)||{}; }catch(e){}
  var CFG0=(typeof window!=='undefined'&&window.CITYLIVE_CFG)||{};
  var savedQuality=['spectacle','balanced','performance'].indexOf(CFG0.quality)>=0?CFG0.quality:'spectacle';
  var st={ era:null, hour:null, age:null, quality:savedQuality, paused:false };
  document.getElementById('q').value=st.quality;
  if(CFG0.showStatus===false) document.getElementById('happening').style.display='none';
  // config era name → session override index (the control bar can still change it live)
  try{ if(CFG0.era&&CFG0.era!=='auto'){ var _ci=ERAS.findIndex(function(e){return e.name===CFG0.era;}); if(_ci>=0) st.era=_ci; } }catch(e){}

  // build the city/era dropdown from the engine's own ERAS table (+ a Live option)
  var eraSel=document.getElementById('era');
  function fillEras(){
    eraSel.innerHTML='';
    var o=document.createElement('option'); o.value=''; o.textContent='◉ Live (Neo Norwich)'; eraSel.appendChild(o);
    // feature the real-city themed ages first, then the rest
    var featured=['boston','artdeco','houston','london','neworleans','paris','tokyo','china'];
    var label={boston:'Boston',artdeco:'New York (Art Deco)',houston:'Houston',london:'London',
      neworleans:'New Orleans',paris:'Paris',tokyo:'Tokyo',china:'China'};
    try{
      featured.forEach(function(n){ var i=ERAS.findIndex(function(e){return e.name===n;});
        if(i>=0){ var op=document.createElement('option'); op.value=i; op.textContent='★ '+(label[n]||n); eraSel.appendChild(op);} });
      ERAS.forEach(function(e,i){ if(featured.indexOf(e.name)<0){ var op=document.createElement('option'); op.value=i; op.textContent=e.name; eraSel.appendChild(op);} });
    }catch(err){}
  }

  function boot(){
    var dpr=Math.min(2,window.devicePixelRatio||1);
    // AUTO-SCALE to the screen: pick the pixel factor so ONE MONITOR's logical width lands
    // near the engine's tuned 427px baseline on ANY resolution (1024x768 → 2, 1080p → 4,
    // 1440p → 6, 4K → 9). On a multi-monitor union window the reference is the PRIMARY
    // display (ENV.primaryW), so the city scales per-monitor while spanning all of them.
    var refW=(ENV.primaryW&&ENV.displayCount>1)?ENV.primaryW:window.innerWidth;
    PXK=Math.max(2,Math.min(10,Math.round(refW*dpr/430)||PXK));
    var cw=Math.max(160,Math.round(window.innerWidth*dpr/PXK)), ch=Math.max(120,Math.round(window.innerHeight*dpr/PXK));
    cv.width=bgcv.width=cw; cv.height=bgcv.height=ch;
    // Wallpaper mode sits UNDER the Windows taskbar — raise the street so the traffic and
    // sidewalks stay visible above it (same trick as the KDE panel handling).
    var tbWp=0;
    // taskbarPx is in DIP (≈CSS px); dpr converts to physical, /PXK to canvas-logical px.
    if(ENV.wallpaper&&ENV.taskbarPx>0) tbWp=Math.ceil(ENV.taskbarPx*dpr/PXK);
    setup('neon',{cw:cw,ch:ch,woff:0,ww:cw,pxk:PXK,kspAuto:true,kspw:Math.round(refW*dpr/PXK),taskbarWp:tbWp,zoom:1,quality:st.quality});
    bgDirty=true;
  }

  function applyOverrides(){
    FORCEERA = st.era;                                  // null → live era
    FORCEAGE = (st.age==null)?null:(st.age/100);        // null → real growth cycle
    if(st.hour==null){ NOWOVR=null; }                   // null → real local time
    else { var d=new Date(); var h=st.hour/10; d.setHours(Math.floor(h),Math.round((h%1)*60),0,0); NOWOVR=d.getTime(); }
  }

  function hud(){
    var el=document.getElementById('hud');
    var name=(st.era==null)?'Live':(ERAS[st.era]&&ERAS[st.era].name);
    var t=(st.hour==null)?'live':((st.hour/10).toFixed(1)+'h');
    var a=(st.age==null)?'live':(st.age+'%');
    el.innerHTML='<b>'+name+'</b> · time '+t+' · age '+a+' · '+st.quality;
  }

  var lastError='', lastErrorAt=0;
  function reportRenderError(err){
    var msg=String(err&&err.stack||err||'Unknown render error'), now=Date.now();
    if(msg!==lastError||now-lastErrorAt>10000){ console.error('CityLive render failure:',err); lastError=msg; lastErrorAt=now; }
    var el=document.getElementById('renderError'); el.textContent='CityLive recovered from a render error: '+msg.split('\n')[0]; el.style.display='block';
  }
  function updateHappening(){
    var el=document.getElementById('happening');
    try{
      var s=typeof cityStatus==='function'?cityStatus(Date.now()):null;
      if(!s) return;
      el.querySelector('.title').textContent=s.title||'City running normally';
      el.querySelector('.meta').textContent=[s.detail,s.dataLabel].filter(Boolean).join(' · ');
      if(window.citylive&&window.citylive.recordChronicle&&typeof chronicleSnapshot==='function'){
        var witness=chronicleSnapshot(Date.now()); if(witness) window.citylive.recordChronicle(witness).catch(function(){});
      }
    }catch(e){ reportRenderError(e); }
  }

  var t=null;
  function resize(){ clearTimeout(t); t=setTimeout(boot,250); }
  window.addEventListener('resize',resize);

  // controls
  eraSel.addEventListener('change',function(){ st.era=this.value===''?null:(+this.value); hud(); });
  document.getElementById('hour').addEventListener('input',function(){ st.hour=+this.value; document.getElementById('hourLive').classList.remove('on'); hud(); });
  document.getElementById('hourLive').addEventListener('click',function(){ st.hour=null; this.classList.add('on'); hud(); });
  document.getElementById('age').addEventListener('input',function(){ st.age=+this.value; document.getElementById('ageLive').classList.remove('on'); hud(); });
  document.getElementById('ageLive').addEventListener('click',function(){ st.age=null; this.classList.add('on'); hud(); });
  document.getElementById('q').addEventListener('change',function(){ st.quality=this.value; boot(); hud(); });
  document.getElementById('pause').addEventListener('click',function(){ st.paused=!st.paused; this.textContent=st.paused?'▶':'⏸'; });
  document.getElementById('full').addEventListener('click',function(){ var el=document.documentElement;
    if(document.fullscreenElement) document.exitFullscreen(); else (el.requestFullscreen||el.webkitRequestFullscreen||function(){}).call(el); });
  // tap top to toggle the bar on touch devices
  document.getElementById('hot').addEventListener('click',function(){ document.getElementById('bar').classList.toggle('show'); });

  fillEras(); boot(); hud(); updateHappening();
  document.getElementById('happening').title='Open the City Chronicle';
  document.getElementById('happening').style.cursor='pointer';
  document.getElementById('happening').addEventListener('click',function(){
    if(window.citylive&&window.citylive.openChronicle) window.citylive.openChronicle().catch(function(){});
  });
  // Two-layer, drift-aware renderer: the expensive sky/terrain backdrop updates slowly;
  // motion stays smooth at the selected tier. requestAnimationFrame also yields when hidden.
  var lastFg=0,lastBg=0,bgDirty=true;
  function frame(ts){
    requestAnimationFrame(frame);
    if(st.paused||document.hidden) return;
    var fps=st.quality==='performance'?8:(st.quality==='balanced'?10:12), fgStep=1000/fps;
    if(ts-lastFg<fgStep) return;
    try{
      applyOverrides();
      var bgStep=st.quality==='performance'?2000:(st.quality==='balanced'?1000:500);
      if(bgDirty||ts-lastBg>=bgStep){ draw(bg,'bg'); lastBg=ts; bgDirty=false; }
      draw(g,'fg'); lastFg=ts;
    }catch(e){ reportRenderError(e); lastFg=ts; }
  }
  requestAnimationFrame(frame);
  setInterval(updateHappening,1000);
  // keep the screen awake if displayed as a kiosk (best effort)
  if(navigator.wakeLock) navigator.wakeLock.request('screen').catch(function(){});
  document.addEventListener('visibilitychange',function(){ if(!document.hidden&&navigator.wakeLock) navigator.wakeLock.request('screen').catch(function(){}); });
})();
</script>

<script>

</script>
</body>
</html>
