<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>kde-repro</title>
<style>html,body{margin:0;background:#000}canvas{image-rendering:pixelated}</style></head>
<body>
<canvas id="cv"></canvas>
<script src="renderer/city.js"></script>
<script>
// Replicate the KDE plugin EXACTLY: a per-monitor SLICE of the 3-monitor world at pxk 3
// (KSP=6/3=2, the classic law — NO kspAuto), so slice/wrap-only artifacts reproduce.
var cv=document.getElementById('cv'), g=cv.getContext('2d');
var Q=new URLSearchParams(location.search);
function qn(k,d){ var v=Q.get(k); return v!=null&&v!==''?+v:d; }
var cw=qn('cw',853), ch=qn('ch',480), woff=qn('woff',776), ww=qn('ww',2269);
cv.width=cw; cv.height=ch;
var sc9=+Q.get('scale')||3;
var sw2=+Q.get('screenw')||cw*sc9, sh2=+Q.get('screenh')||ch*sc9;
cv.style.width=sw2+'px'; cv.style.height=sh2+'px';
if(Q.get('smooth')==='1') cv.style.imageRendering='auto';   // linear sampling, like a GPU texture upscale
FORCEAGE=+Q.get('age')||0.12;
if(Q.get('death')){ FORCEDEATH=Q.get('death'); }
if(Q.get('now')){ NOWOVR=+Q.get('now'); }
if(Q.get('clock')){ CLOCK=+Q.get('clock'); }   // pins the sim's wall-clock (day/night) separately from NOWOVR
if(Q.get('apoc')!=null){ var _ap=+Q.get('apoc'); FORCEAGE={g:1,phase:'apoc',apoc:_ap,cy:0.955+0.045*_ap}; }
if(Q.get('space')!=null){ var _sp=+Q.get('space'); FORCEAGE={g:1,phase:'peak',apoc:0,cy:0.80+0.13*_sp}; }   // pins the SPACE AGE ramp (curSpace≈_sp, EDUB aside)
if(Q.get('dis')){ FORCEDIS={type:Q.get('dis'),intensity:4,xf:0.5,w:60,seed:77,f:qn('disf',0.25)}; }
try{ setup('neon',{cw:cw,ch:ch,woff:woff,ww:ww,pxk:3,zoom:1,quality:'spectacle'}); document.title='SETUP_OK'; }
catch(e){ document.title='SETUP_ERR '+(e&&e.message); }
function frame(){ if(window.__stop) return; try{ draw(g); }catch(e){ document.title='DRAW_ERR '+((e&&e.stack)||e).toString().replace(/\n/g,' | ').slice(0,300); } requestAnimationFrame(frame); }
frame();
setTimeout(function(){ try{
  var rn=(typeof NOWOVR!=='undefined'&&NOWOVR)?NOWOVR:Date.now();
  var ex='';
  if(Q.get('probe')==='heli'){ var hc=chopperNow(rn), hbs=[];
    [near,mid].forEach(function(ly,li){ ly.blds.forEach(function(b){ if(b.crown==='helipad')
      hbs.push({ly:li?'mid':'near',x:Math.round(b.x),w:b.w,h:Math.round(b.h),y0:Math.round(ly.y0),d:b.district,t:b.type,ba:+(b.bAge+b.band).toFixed(3),sp:+(b.spAge||0).toFixed(2)}); }); });
    ex=' pads='+JSON.stringify(helipads.map(function(p){return {x:Math.round(p.x),y:Math.round(p.y),ba:+(p.bAge+p.band).toFixed(3)};}))
      +' hbs='+JSON.stringify(hbs)
      +' cityG='+(+cityG.toFixed(3))+' chop='+(hc?Math.round(hc.x)+','+Math.round(hc.y)+',landed='+hc.landed:'none'); }
  if(Q.get('probe')==='pub'){ ex=' pubs='+JSON.stringify(pubs.map(function(p){return Math.round(p.x);}))+' cityG='+(+cityG.toFixed(2)); }
  if(Q.get('probe')==='exp'){ var bp=null; (mts&&mts.near||[]).forEach(function(p){ if(!bp||p.h>bp.h) bp=p; });
    ex=' peak='+(bp?Math.round(bp.x)+',h'+Math.round(bp.h):'none')+' mx1='+(mtsCache?Math.round(mtsCache.mx[1]):-1)
      +' ch='+(+(cityGrowth(rn).cy*9).toFixed(2)); }
  if(Q.get('probe')==='bus'){ var bl=[];
    for(var bt=0;bt<8;bt++){ var b8=busCrosser(rn+bt*500,26000,0.030,20,0.86);
      bl.push(b8?Math.round(b8.x)+(b8.stopped?'S':'m'):'-'); }
    ex=' stops='+JSON.stringify(busstops.map(Math.round))+' bus@+0..3.5s='+bl.join('|'); }
  document.title='WW='+WW+' SW='+SW+' WOFF='+WOFF+' liveEpi='+Math.round(apocEpiX(rn))+' liveXA='+Math.round(kwTitanX(rn,0))+' liveXB='+Math.round(kwTitanX(rn,1))+' apocMs='+Math.round(apocMs)+ex;
}catch(e){ document.title='PROBE_ERR '+e; } }, 1800);
</script>
</body></html>
